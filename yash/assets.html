<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <style>
        .box-1 {
            background: lightgray;
            height: 400px;
            width: 450px;
            margin-left: 29%;
            border-radius: 30px;
        }

        .box-2 {
            height: 160px;
            width: 330px;
            background: #e4e4e4;
            margin-left: 15%;
            border-radius: 50px;
            display: none;
        }
    </style>
    <script>
        function sms() {
            document.getElementById("one").style.display = "block";
        }
    </script>
</head>

<body>
    <div class="box-1">
        <h1 style="text-align: center;color: #000;">Display box</h1>
        <b>
            <p style="text-align: center;">Click the button to revile the hidden doc.</p><br>
        </b>
        <button onclick="sms()"
            style="margin-left: 150px; border-radius: 20px; height: 30px;width: 150px; background: #33ff00;">SHOW
            SMS</button>
        <br><br><br>
        <div id="one" class="box-2">
            <p style="text-align: center;padding: 50px;">Lorem ipsum dolor sit <br> amet consectetur adipisicing <br>
                elit. </p>
        </div>
    </div>
</body>

</html>
